<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#D4AF37;--gold-light:#F0D060;--dark:#080A0D;--surface:#0E1117;--surface2:#141820;--border:rgba(212,175,55,0.2);--text:#F0EEE8;--muted:rgba(240,238,232,0.6)}
body{background:var(--dark);color:var(--text);font-family:'DM Mono',monospace;padding:30px}

.mfx-panel{background:var(--surface);border:1px solid rgba(212,175,55,0.35);border-radius:2px;padding:28px 24px;position:relative;overflow:hidden;margin-bottom:16px}
.mfx-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.mfx-header{display:flex;align-items:center;justify-content:space-between}
.input-num{font-size:10px;letter-spacing:.3em;color:var(--gold);display:block;margin-bottom:8px}
.input-label{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:var(--muted)}
.mfx-btn{background:var(--gold);color:#080A0D;border:none;padding:10px 22px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;border-radius:1px}
.mfx-btn:hover{background:var(--gold-light)}
.mfx-body{margin-top:24px;display:none}
.mfx-body.visible{display:block}
.mfx-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.mfx-field-label{font-size:9px;letter-spacing:.28em;color:var(--gold);text-transform:uppercase;display:block;margin-bottom:8px}
.input-field{width:100%;background:transparent;border:none;border-bottom:1px solid rgba(212,175,55,.3);color:var(--text);font-family:'DM Mono',monospace;font-size:16px;padding:6px 0;outline:none}
.mfx-status{font-size:10px;letter-spacing:.15em;color:var(--muted);margin-top:10px;display:block}
.mfx-status.ok{color:#6FCF97}
.mfx-status.err{color:#EB5757}
.mfx-data-card{margin-top:20px;background:var(--surface2);border:1px solid var(--border);border-radius:2px;overflow:hidden}
.mfx-data-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border)}
.mfx-data-item{background:var(--surface);padding:14px 18px}
.mfx-data-label{font-size:8px;letter-spacing:.25em;color:var(--gold);text-transform:uppercase;display:block;margin-bottom:5px}
.mfx-data-val{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;color:var(--text);display:block}
.mfx-data-val.accent{color:var(--gold-light)}
.mfx-data-val.red{color:#EB5757}
.mfx-import-bar{padding:10px 18px;background:rgba(212,175,55,.06);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.mfx-import-note{font-size:9px;color:#6FCF97;letter-spacing:.1em}
.mfx-update-time{font-size:9px;color:var(--muted);letter-spacing:.1em}
.btn-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.mfx-btn-out{background:transparent;border:1px solid rgba(212,175,55,.4);color:var(--muted)}
.mfx-btn-out:hover{border-color:var(--gold);color:var(--gold);background:transparent}
</style>
</head>
<body>

<div class="mfx-panel">
  <div class="mfx-header">
    <div>
      <span class="input-num">00</span>
      <span class="input-label">Connecter MyFXBook</span>
    </div>
    <button class="mfx-btn" id="mfxToggleBtn">▼ Ouvrir</button>
  </div>

  <div class="mfx-body" id="mfxBody">
    <div class="mfx-grid">
      <div>
        <span class="mfx-field-label">Email MyFXBook</span>
        <input type="email" class="input-field" id="mfxEmail" placeholder="votre@email.com">
      </div>
      <div>
        <span class="mfx-field-label">Mot de passe</span>
        <input type="password" class="input-field" id="mfxPassword" placeholder="••••••••">
      </div>
    </div>

    <div class="btn-row">
      <button class="mfx-btn" id="mfxLoginBtn">⟳ Se connecter</button>
      <button class="mfx-btn mfx-btn-out" id="mfxLogoutBtn" style="display:none">✕ Déconnecter</button>
      <button class="mfx-btn" id="mfxExportBtn" style="display:none;background:#1a2a1a;color:#6FCF97;border:1px solid #6FCF97">⬇ Générer version publique</button>
    </div>
    <span class="mfx-status" id="mfxStatus"></span>

    <div id="mfxAccountSelector" style="display:none;margin-top:18px">
      <span class="mfx-field-label">Compte à importer</span>
      <div id="mfxAccountTabs" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px"></div>
    </div>

    <div class="mfx-data-card" id="mfxDataCard" style="display:none">
      <div class="mfx-data-grid">
        <div class="mfx-data-item"><span class="mfx-data-label">Compte</span><span class="mfx-data-val" id="mfxName">—</span></div>
        <div class="mfx-data-item"><span class="mfx-data-label">Balance</span><span class="mfx-data-val" id="mfxBalance">—</span></div>
        <div class="mfx-data-item"><span class="mfx-data-label">Gain journalier</span><span class="mfx-data-val accent" id="mfxDaily">—</span></div>
        <div class="mfx-data-item"><span class="mfx-data-label">Gain mensuel</span><span class="mfx-data-val" id="mfxMonthly">—</span></div>
        <div class="mfx-data-item"><span class="mfx-data-label">Gain total</span><span class="mfx-data-val" id="mfxGain">—</span></div>
        <div class="mfx-data-item"><span class="mfx-data-label">Drawdown</span><span class="mfx-data-val red" id="mfxDrawdown">—</span></div>
      </div>
      <div class="mfx-import-bar">
        <span class="mfx-import-note" id="mfxImportNote">✔ Données importées</span>
        <span class="mfx-update-time" id="mfxUpdateTime"></span>
      </div>
    </div>
  </div>
</div>

<script>
const API = '/.netlify/functions/myfxbook';
let mfxSession = null, mfxAccounts = [], mfxActiveAccount = null, mfxOn = false;

const $ = id => document.getElementById(id);

// ── Toggle ──────────────────────────────────────────────
$('mfxToggleBtn').onclick = function() {
  mfxOn = !mfxOn;
  $('mfxBody').style.display = mfxOn ? 'block' : 'none';
  this.textContent = mfxOn ? '▲ Fermer' : '▼ Ouvrir';
};

// ── Login ───────────────────────────────────────────────
$('mfxLoginBtn').onclick = async function() {
  const email    = $('mfxEmail').value.trim();
  const password = $('mfxPassword').value.trim();
  if(!email || !password){ setStatus('Renseignez email et mot de passe.','err'); return; }
  this.disabled = true;
  setStatus('Connexion en cours…','');
  try {
    const url = `${API}?action=login&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`;
    const res  = await fetch(url);
    const data = await res.json();
    if(data.error){ setStatus('Erreur : ' + data.message,'err'); this.disabled=false; return; }
    mfxSession = data.session;
    setStatus('Connecté ✔ — Récupération des comptes…','ok');
    await fetchAccounts();
  } catch(e) {
    setStatus('Erreur de connexion. Vérifiez vos identifiants.','err');
  }
  this.disabled = false;
};

// ── Fetch accounts ──────────────────────────────────────
async function fetchAccounts() {
  try {
    const url  = `${API}?action=accounts&session=${mfxSession}`;
    const res  = await fetch(url);
    const data = await res.json();
    if(data.error){ setStatus('Erreur comptes : '+data.message,'err'); return; }
    mfxAccounts = data.accounts;
    $('mfxLogoutBtn').style.display = 'inline-block';
    $('mfxLoginBtn').style.display  = 'none';
    if(mfxAccounts.length > 1){
      $('mfxAccountSelector').style.display = 'block';
      const tabs = $('mfxAccountTabs'); tabs.innerHTML = '';
      mfxAccounts.forEach((acc,i) => {
        const btn = document.createElement('button');
        btn.className = 'mfx-btn' + (i===0?' active':'');
        btn.style.cssText = 'font-size:9px;padding:6px 14px;margin-right:6px';
        btn.textContent = acc.name;
        btn.onclick = () => { document.querySelectorAll('#mfxAccountTabs .mfx-btn').forEach(b=>b.style.background='var(--gold)'); applyAccount(acc); };
        tabs.appendChild(btn);
      });
      applyAccount(mfxAccounts[0]);
    } else if(mfxAccounts.length === 1) {
      applyAccount(mfxAccounts[0]);
    } else {
      setStatus('Aucun compte trouvé.','err');
    }
  } catch(e) { setStatus('Impossible de récupérer les comptes.','err'); }
}

// ── Apply account ───────────────────────────────────────
function applyAccount(acc) {
  mfxActiveAccount = acc;
  $('mfxName').textContent     = acc.name;
  $('mfxBalance').textContent  = parseFloat(acc.balance).toLocaleString('fr-FR',{maximumFractionDigits:2}) + ' ' + (acc.currency||'€');
  $('mfxDaily').textContent    = parseFloat(acc.daily).toLocaleString('fr-FR',{maximumFractionDigits:2}) + ' %';
  $('mfxMonthly').textContent  = parseFloat(acc.monthly).toLocaleString('fr-FR',{maximumFractionDigits:2}) + ' %';
  $('mfxGain').textContent     = parseFloat(acc.gain).toLocaleString('fr-FR',{maximumFractionDigits:2}) + ' %';
  $('mfxDrawdown').textContent = parseFloat(acc.drawdown).toLocaleString('fr-FR',{maximumFractionDigits:2}) + ' %';
  $('mfxUpdateTime').textContent = 'Mis à jour : ' + acc.lastUpdateDate;
  $('mfxDataCard').style.display = 'block';
  $('mfxExportBtn').style.display = 'inline-block';
  setStatus('✔ ' + acc.name + ' prêt à être importé dans Fabulor','ok');
}

// ── Logout ──────────────────────────────────────────────
$('mfxLogoutBtn').onclick = function() {
  if(mfxSession) fetch(`${API}?action=logout&session=${mfxSession}`).catch(()=>{});
  mfxSession=null; mfxAccounts=[]; mfxActiveAccount=null;
  $('mfxLogoutBtn').style.display='none'; $('mfxLoginBtn').style.display='inline-block';
  $('mfxDataCard').style.display='none'; $('mfxAccountSelector').style.display='none';
  $('mfxEmail').value=''; $('mfxPassword').value='';
  setStatus('Déconnecté.','');
};

// ── Status ──────────────────────────────────────────────
function setStatus(msg, type) {
  const el = $('mfxStatus');
  el.textContent = msg;
  el.className = 'mfx-status' + (type?' '+type:'');
}
</script>
</body>
</html>
